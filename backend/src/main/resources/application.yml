server:
  port: ${PORT:${SERVER_PORT:8080}}

spring:
  application:
    name: ai-data-plc

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

plc:
  realtime-delay-seconds: ${PLC_REALTIME_DELAY_SECONDS:5}
  ai-control-mode: ${AI_CONTROL_MODE:RECOMMEND_ONLY}
  providers:
    deepseek:
      display-name: DeepSeek Pro
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY:}
      model-name: ${DEEPSEEK_MODEL_NAME:deepseek-reasoner}
      industrial-algorithm-capable: true
    qwen:
      display-name: Qwen
      base-url: ${QWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      api-key: ${QWEN_API_KEY:}
      model-name: ${QWEN_MODEL_NAME:qwen-plus}
      industrial-algorithm-capable: true
    glm:
      display-name: GLM
      base-url: ${GLM_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
      api-key: ${GLM_API_KEY:}
      model-name: ${GLM_MODEL_NAME:glm-4-plus}
      industrial-algorithm-capable: true
    minimax:
      display-name: MiniMax
      base-url: ${MINIMAX_BASE_URL:https://api.minimax.chat/v1}
      api-key: ${MINIMAX_API_KEY:}
      model-name: ${MINIMAX_MODEL_NAME:abab6.5s-chat}
      industrial-algorithm-capable: false
    openai-compatible:
      display-name: OpenAI Compatible
      base-url: ${OPENAI_COMPATIBLE_BASE_URL:}
      api-key: ${OPENAI_COMPATIBLE_API_KEY:}
      model-name: ${OPENAI_COMPATIBLE_MODEL_NAME:}
      industrial-algorithm-capable: false
