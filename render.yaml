services:
  - type: web
    name: ai-data-plc-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8080
      - key: PLC_REALTIME_DELAY_SECONDS
        value: 5
      - key: AI_CONTROL_MODE
        value: RECOMMEND_ONLY
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL_NAME
        value: deepseek-reasoner
      - key: QWEN_BASE_URL
        value: https://dashscope.aliyuncs.com/compatible-mode/v1
      - key: QWEN_API_KEY
        sync: false
      - key: QWEN_MODEL_NAME
        value: qwen-plus
      - key: GLM_BASE_URL
        value: https://open.bigmodel.cn/api/paas/v4
      - key: GLM_API_KEY
        sync: false
      - key: GLM_MODEL_NAME
        value: glm-4-plus
      - key: MINIMAX_BASE_URL
        value: https://api.minimax.chat/v1
      - key: MINIMAX_API_KEY
        sync: false
      - key: MINIMAX_MODEL_NAME
        value: abab6.5s-chat

  - type: web
    name: ai-data-plc-frontend
    runtime: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    envVars:
      - key: PORT
        value: 80
      - key: VITE_API_BASE_URL
        sync: false
