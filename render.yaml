services:
  - type: web
    name: ai-data-plc-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /actuator/health
    envVars:
      - key: PLC_REALTIME_DELAY_SECONDS
        value: 5
      - key: AI_CONTROL_MODE
        value: RECOMMEND_ONLY
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: QWEN_API_KEY
        sync: false
      - key: GLM_API_KEY
        sync: false
      - key: MINIMAX_API_KEY
        sync: false

  - type: web
    name: ai-data-plc-frontend
    runtime: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
