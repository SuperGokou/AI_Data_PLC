services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_data_plc}
      MYSQL_USER: ${MYSQL_USER:-plc}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-plc_dev_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_dev_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./deploy/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  influxdb:
    image: influxdb:2.7
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin_dev_password
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-supergokou}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-plc_timeseries}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-dev-influx-token-change-me}
    ports:
      - "8086:8086"
    volumes:
      - influx-data:/var/lib/influxdb2

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./backend
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      PLC_REALTIME_DELAY_SECONDS: ${PLC_REALTIME_DELAY_SECONDS:-5}
      AI_CONTROL_MODE: ${AI_CONTROL_MODE:-RECOMMEND_ONLY}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_data_plc}
      MYSQL_USER: ${MYSQL_USER:-plc}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-plc_dev_password}
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_ORG: ${INFLUXDB_ORG:-supergokou}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-plc_timeseries}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-dev-influx-token-change-me}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL_NAME: ${DEEPSEEK_MODEL_NAME:-deepseek-reasoner}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      QWEN_MODEL_NAME: ${QWEN_MODEL_NAME:-qwen-plus}
      GLM_BASE_URL: ${GLM_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      GLM_API_KEY: ${GLM_API_KEY:-}
      GLM_MODEL_NAME: ${GLM_MODEL_NAME:-glm-4-plus}
      MINIMAX_BASE_URL: ${MINIMAX_BASE_URL:-https://api.minimax.chat/v1}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_MODEL_NAME: ${MINIMAX_MODEL_NAME:-abab6.5s-chat}
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL:-}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-}
      OPENAI_COMPATIBLE_MODEL_NAME: ${OPENAI_COMPATIBLE_MODEL_NAME:-}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      influxdb:
        condition: service_started
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql-data:
  influx-data:
  redis-data:
